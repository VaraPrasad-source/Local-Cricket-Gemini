<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <!-- Background Gradient representing modern stadium night underlights -->
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#14534a" />
      <stop offset="60%" stop-color="#0a0f24" />
      <stop offset="100%" stop-color="#050711" />
    </radialGradient>

    <!-- Stadium spotlight effect -->
    <radialGradient id="spotlight-left" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#1fffc5" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1fffc5" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="spotlight-right" cx="80%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>

    <!-- Glow for the cricket ball -->
    <radialGradient id="ball-glow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff5252" />
      <stop offset="70%" stop-color="#b71c1c" />
      <stop offset="100%" stop-color="#4a0000" />
    </radialGradient>

    <!-- Glossy reflection on the ball -->
    <linearGradient id="ball-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8" />
    </linearGradient>

    <!-- Cricket bat texture and gradient -->
    <linearGradient id="bat-wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d7ccc8" />
      <stop offset="35%" stop-color="#b0bec5" />
      <stop offset="70%" stop-color="#78909c" />
      <stop offset="100%" stop-color="#455a64" />
    </linearGradient>

    <linearGradient id="bat-grip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="50%" stop-color="#333333" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Gold text gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#1fffc5" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow-ball" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="15" dy="25" stdDeviation="15" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <filter id="shadow-bat" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-10" dy="20" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1080" height="1920" fill="url(#bg-glow)" />

  <!-- Spotlights -->
  <rect width="1080" height="1920" fill="url(#spotlight-left)" />
  <rect width="1080" height="1920" fill="url(#spotlight-right)" />

  <!-- Subtle abstract background geometries representing field boundaries -->
  <circle cx="540" cy="1920" r="1600" fill="none" stroke="#2dd4bf" stroke-opacity="0.04" stroke-width="3" />
  <circle cx="540" cy="1920" r="1400" fill="none" stroke="#2dd4bf" stroke-opacity="0.03" stroke-width="2" />
  <circle cx="540" cy="1920" r="1200" fill="none" stroke="#2dd4bf" stroke-opacity="0.02" stroke-width="1.5" />

  <!-- CRICKET BAT VECTOR (Diagonal right to left) -->
  <g transform="translate(540, 850) rotate(-35) translate(-540, -850)" filter="url(#shadow-bat)">
    <!-- Bat blade -->
    <path d="M 490 550 L 525 550 L 525 1180 Q 525 1210 507 1210 Q 490 1210 490 1180 Z" fill="url(#bat-wood)" />
    <!-- Center spine for 3D realism -->
    <path d="M 507 550 L 507 1210" stroke="#37474f" stroke-width="2" stroke-opacity="0.3" />
    <!-- Bat handle shoulder -->
    <path d="M 498 550 L 517 550 L 512 480 L 503 480 Z" fill="#90a4ae" />
    <!-- Bat rubber grip (Wrap details overlay) -->
    <rect x="502" y="300" width="11" height="180" rx="3" fill="url(#bat-grip)" />
    <!-- Grip wraps -->
    <line x1="502" y1="330" x2="513" y2="330" stroke="#222" stroke-width="3" />
    <line x1="502" y1="360" x2="513" y2="360" stroke="#222" stroke-width="3" />
    <line x1="502" y1="390" x2="513" y2="390" stroke="#222" stroke-width="3" />
    <line x1="502" y1="420" x2="513" y2="420" stroke="#222" stroke-width="3" />
    <line x1="502" y1="450" x2="513" y2="450" stroke="#111" stroke-width="3" />
    <!-- Handle Knob -->
    <ellipse cx="5075" cy="300" rx="8" ry="4" transform="scale(0.1, 1)" fill="#e53935" />
    <rect x="500" y="295" width="15" height="7" rx="2" fill="#111" />
  </g>

  <!-- CRICKET BALL VECTOR -->
  <g filter="url(#shadow-ball)">
    <!-- Base Ball -->
    <circle cx="560" cy="980" r="120" fill="url(#ball-glow)" />
    
    <!-- 3D Gloss Layer -->
    <circle cx="560" cy="980" r="120" fill="url(#ball-shine)" />

    <!-- Ball Seam (Vector Curved Paths with intricate stitch notches) -->
    <!-- Center Seam Line -->
    <path d="M 452 935 Q 545 990 668 1025" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-dasharray="1,1" />
    <path d="M 452 935 Q 545 990 668 1025" fill="none" stroke="#2b2b2b" stroke-width="4" stroke-opacity="0.3" />

    <!-- Stitches Left -->
    <path d="M 453 928 Q 543 983 664 1018" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,8" stroke-opacity="0.8" />
    
    <!-- Stitches Right -->
    <path d="M 451 942 Q 547 997 672 1032" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,8" stroke-opacity="0.8" />

    <!-- Soft Ambient Highlights -->
    <circle cx="520" cy="940" r="40" fill="#ffffff" opacity="0.15" filter="blur(8px)" />
  </g>

  <!-- Wickets background graphic behind text (Bottom Center) -->
  <g transform="translate(540, 1600)" opacity="0.15">
    <!-- Stumps -->
    <rect x="-70" y="-80" width="16" height="200" rx="3" fill="#ffffff" />
    <rect x="-8" y="-80" width="16" height="200" rx="3" fill="#ffffff" />
    <rect x="54" y="-80" width="16" height="200" rx="3" fill="#ffffff" />
    <!-- Bails -->
    <rect x="-75" y="-95" width="70" height="12" rx="2" fill="#ffffff" />
    <rect x="5" y="-95" width="70" height="12" rx="2" fill="#ffffff" />
  </g>

  <!-- TYPOGRAPHY LAYER -->
  <g transform="translate(540, 1420)">
    <!-- App Title (Main) -->
    <text x="0" y="0" 
          font-family="'Outfit', 'Inter', sans-serif" 
          font-size="72" 
          font-weight="800" 
          fill="url(#gold-grad)" 
          text-anchor="middle" 
          letter-spacing="12"
          filter="url(#text-glow)">LOCAL CRICKET</text>
    
    <!-- App Subtitle -->
    <text x="0" y="65" 
          font-family="'Inter', sans-serif" 
          font-size="32" 
          font-weight="600" 
          fill="#1fffc5" 
          text-anchor="middle" 
          letter-spacing="16" 
          opacity="0.9">CHAMPIONSHIP MANAGER</text>

    <!-- Tiny styling separator -->
    <line x1="-120" y1="110" x2="120" y2="110" stroke="#1fffc5" stroke-width="2" opacity="0.4" />
    
    <!-- App Tagline / Status -->
    <text x="0" y="150" 
          font-family="'Inter', sans-serif" 
          font-size="22" 
          font-weight="400" 
          fill="#94a3b8" 
          text-anchor="middle" 
          letter-spacing="4">SCORES • STANDINGS • TOURNAMENTS</text>
  </g>

  <!-- Glowing accent border to frame the phone screen beautifully -->
  <rect x="15" y="15" width="1050" height="1890" rx="10" fill="none" stroke="#2dd4bf" stroke-opacity="0.1" stroke-width="4" />
</svg>
