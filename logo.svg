<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Dark Blue Gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#08143a" />
      <stop offset="40%" stop-color="#040b24" />
      <stop offset="100%" stop-color="#01030d" />
    </radialGradient>

    <!-- Exquisite Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Intense center glow -->
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <!-- Wide ambient glow -->
      <feGaussianBlur stdDeviation="20" result="blur2" />
      
      <!-- Flood neon mint-green color -->
      <feFlood flood-color="#00FFCC" flood-opacity="0.8" result="color1" />
      <feComposite in="color1" in2="blur1" operator="in" result="glow1" />
      
      <feFlood flood-color="#00FFA6" flood-opacity="0.4" result="color2" />
      <feComposite in="color2" in2="blur2" operator="in" result="glow2" />
      
      <!-- Combine all layers -->
      <feMerge>
        <feMergeNode in="glow2" />
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

  <!-- Centered Neon Cricket bat and ball layout -->
  <g filter="url(#neonGlow)">
    <!-- 1. The Stylized Cricket Bat (Leaning from top-left to bottom-right) -->
    <g transform="translate(230, 275) rotate(-45)">
      <!-- Blade: Hollow Rounded Rect -->
      <rect x="-24" y="-85" width="48" height="135" rx="18" fill="none" stroke="#00FFCC" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Handle: Thick round-capped stick with modern architectural gap -->
      <line x1="0" y1="68" x2="0" y2="120" stroke="#00FFCC" stroke-width="15" stroke-linecap="round" />
    </g>

    <!-- 2. The Ball: Perfect hollow circle to the upper right of the bat -->
    <circle cx="318" cy="210" r="28" fill="none" stroke="#00FFCC" stroke-width="15" />
  </g>
</svg>
